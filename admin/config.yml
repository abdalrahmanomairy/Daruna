backend:
  name: git-gateway
  branch: main   # غيّرها إلى master إذا كان فرعك الرئيسي اسمه master

locale: 'ar'

media_folder: "images/uploads"
public_folder: "/images/uploads"

site_url: https://golden-medovik-28b9a3.netlify.app
display_url: https://golden-medovik-28b9a3.netlify.app
logo_url: https://golden-medovik-28b9a3.netlify.app/logo.png

collections:
  - name: "properties"
    label: "العقارات"
    label_singular: "عقار"
    folder: "_properties"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "عنوان العقار", name: "title", widget: "string" }
      - { label: "نوع العقار", name: "type", widget: "select", options: ["شقة", "بيت", "أرض", "محل تجاري"] }
      - { label: "السعر", name: "price", widget: "number" }
      - { label: "العملة", name: "currency", widget: "select", options: ["دولار", "ليرة سورية", "ليرة تركية"] }
      - { label: "المنطقة", name: "location", widget: "string" }
      - { label: "المساحة (متر مربع)", name: "area", widget: "number" }
      - { label: "عدد الغرف", name: "rooms", widget: "number", required: false }
      - { label: "صورة العقار", name: "image", widget: "image" }
      - { label: "الوصف", name: "description", widget: "text" }
      - { label: "رقم التواصل", name: "phone", widget: "string" }
      - { label: "للبيع أم للإيجار", name: "status", widget: "select", options: ["للبيع", "للإيجار"] }
