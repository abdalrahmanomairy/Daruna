backend:
  name: github
  repo: abdalrahmanomairy/Daruna
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "properties"
    label: "العقارات"
    files:
      - file: "data/properties.json"
        label: "قائمة العقارات"
        name: "properties"
        fields:
          - label: "العقارات"
            name: "properties"
            widget: "list"
            fields:

              - { label: "عنوان العقار", name: "title", widget: "string" }

              - { label: "الوصف", name: "description", widget: "text" }

              - label: "المنطقة"
                name: "location"
                widget: "select"
                options: ["إدلب", "حلب", "دمشق", "ريف دمشق", "حمص", "حماة"]

              - label: "نوع العقار"
                name: "type"
                widget: "select"
                options: ["منزل", "شقة", "محل تجاري", "أرض"]

              - label: "الغرض"
                name: "purpose"
                widget: "select"
                options: ["بيع", "إيجار"]

              - { label: "السعر", name: "price", widget: "number" }

              - { label: "رقم الهاتف", name: "phone", widget: "string" }

              - { label: "واتساب", name: "whatsapp", widget: "string" }

              - { label: "الإيميل", name: "email", widget: "string" }

              - { label: "رابط الموقع (Google Maps)", name: "map", widget: "string" }

              - { label: "الصورة", name: "image", widget: "image" }
